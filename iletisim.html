<!DOCTYPE html>
<html lang='tr'>
<head>
<meta charset='UTF-8'>

<title>İletişim - Yusuf</title>
<style>
/* Temel Değişkenler */
:root {
    --bg-main: #0d1117;
    --bg-sec: #161b22;
    --accent: #58a6ff;
    --accent-hover: #1f6feb;
    --text-main: #f0f6fc;
    --text-dim: #c9d1d9;
    --border: #30363d;
    --input-bg: rgba(255, 255, 255, 0.05);
}

body { 
    background: var(--bg-main); 
    color: var(--text-main); 
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
    margin: 0; 
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Navigasyon */
header nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(22, 27, 34, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
}

header nav ul { 
    display: flex; 
    list-style: none; 
    padding: 0 20px; 
    margin: 0; 
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
}

header nav ul::-webkit-scrollbar { display: none; }

header nav ul li a { 
    display: block;
    padding: 20px 15px;
    color: var(--text-main); 
    text-decoration: none; 
    font-weight: 600; 
    font-size: 0.9rem;
    transition: 0.3s; 
}

header nav ul li a:hover, header nav ul li a.active { 
    color: var(--accent); 
    box-shadow: inset 0 -3px 0 var(--accent);
}

/* Ana Konteyner */
.main-container { 
    max-width: 600px; 
    margin: auto; 
    padding: 60px 20px; 
    width: 100%;
    box-sizing: border-box;
}

h1 {
    text-align: center;
    color: var(--accent);
    margin-bottom: 40px;
    font-size: 2.5rem;
    letter-spacing: -1px;
}

/* Form Tasarımı */
form { 
    display: flex; 
    flex-direction: column; 
    gap: 20px; 
    background: var(--bg-sec); 
    padding: 40px; 
    border-radius: 20px; 
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

input, textarea { 
    padding: 16px; 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    background: var(--input-bg); 
    color: var(--text-main); 
    font-size: 1rem; 
    transition: 0.3s ease;
    outline: none;
}

input:focus, textarea:focus {
    border-color: var(--accent);
    background: rgba(88, 166, 255, 0.05);
    box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.1);
}

input::placeholder, textarea::placeholder { 
    color: var(--text-dim); 
    opacity: 0.6;
}

textarea { 
    resize: none; 
    min-height: 160px; 
    font-family: inherit;
}

button { 
    padding: 16px; 
    border: none; 
    border-radius: 12px; 
    background: var(--accent); 
    color: #0d1117; 
    font-weight: 700; 
    font-size: 1.1rem;
    cursor: pointer; 
    transition: all 0.3s ease; 
    margin-top: 10px;
}

button:hover { 
    background: var(--accent-hover); 
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(88, 166, 255, 0.3);
}

button:active {
    transform: translateY(0);
}

/* Footer */
footer { 
    background: var(--bg-sec); 
    text-align: center; 
    padding: 40px 20px; 
    margin-top: 60px; 
    border-top: 1px solid var(--border);
}

footer p { margin: 10px 0; font-size: 0.9rem; }

footer a { 
    color: var(--accent); 
    margin: 0 8px; 
    text-decoration: none; 
    font-weight: 600; 
    transition: 0.3s;
}

footer a:hover {
    color: var(--text-main);
}

/* Mobil Uyumluluk */
@media (max-width: 600px) {
    .main-container { padding: 40px 15px; }
    form { padding: 25px; }
    h1 { font-size: 2rem; }
}
</style>
</head>
