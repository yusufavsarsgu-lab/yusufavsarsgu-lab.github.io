<!DOCTYPE html>
<html lang='tr'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Sayfa Başlığı</title>
<style>
/* Genel */
body {margin:0; font-family:'Segoe UI',sans-serif; background:#0f172a; color:#e0e0e0;}
a {text-decoration:none; color:inherit;}
.container {max-width:1200px; margin:0 auto; padding:1rem;}

/* Navbar */
.navbar {display:flex; justify-content:center; align-items:center; flex-wrap:wrap; background:#1e293b; padding:1rem;}
.navbar h2 {color:#38bdf8; margin-right:2rem; font-size:1.8rem;}
.navbar ul {display:flex; flex-wrap:wrap; list-style:none; gap:1rem; margin:0; padding:0;}
.navbar ul li a {color:#e0e0e0; padding:0.5rem 1rem; transition:0.3s; border-radius:6px;}
.navbar ul li a:hover, .navbar ul li a.active {color:#0f172a; background:#38bdf8;}
.menu-toggle {display:none; font-size:1.8rem; cursor:pointer; color:#38bdf8;}

/* Responsive */
@media(max-width:768px){
    .navbar {flex-direction:column; gap:0.5rem;}
    .navbar ul {flex-direction:column; width:100%; display:none;}
    .navbar ul.active {display:flex;}
    .menu-toggle {display:block; align-self:flex-end;}
}

/* Footer */
.footer {background:#1e293b; text-align:center; padding:1.5rem; color:#94a3b8; margin-top:2rem; font-size:0.95rem;}

/* Başlık ve içerik */
.main-content {padding:2rem; text-align:center;}
h1,h2,h3 {color:#38bdf8;}
p {line-height:1.6; margin-bottom:1rem;}
.btn {background:#38bdf8; color:#0f172a; padding:0.5rem 1rem; border-radius:6px; border:none; cursor:pointer; transition:0.3s;}
.btn:hover {background:#22d3ee; color:#0f172a;}

/* Mobilde içerik taşmasını önleme */
img, .product-cards, .card {max-width:100%; box-sizing:border-box;}
.product-cards {display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:2rem;}
.card {background:#1e293b; padding:1.5rem; border-radius:12px; box-shadow:0 0 12px #0f172a; transition:0.3s;}
.card:hover {transform:translateY(-6px) scale(1.02); box-shadow:0 0 18px #38bdf8;}
</style>
</head>
<body>

<header class='navbar'>
<h2>YUSUF</h2>
<div class='menu-toggle'>☰</div>
<ul>
<li><a href='anasayfa.html' class='active'>Anasayfa</a></li>
<li><a href='hakkimda.html'>Hakkımda</a></li>
<li><a href='faaliyetler.html'>Faaliyetler</a></li>
<li><a href='urunler.html'>Ürünler</a></li>
<li><a href='egitimler.html'>Eğitimler</a></li>
<li><a href='iletisim.html'>İletişim</a></li>
</ul>
</header>

<main class='main-content container'>
<h1>Sayfa Başlığı</h1>
<p>Sayfa içeriği buraya gelecek. Tüm içerik responsive ve mobil/tablet uyumlu olacak şekilde ayarlanmıştır.</p>
</main>

<footer class='footer'>
© 2026 Yusuf Avsar Official. Tüm hakları saklıdır.
</footer>

<script>
// Hamburger Menü
const menuToggle = document.querySelector('.menu-toggle');
const menu = document.querySelector('.navbar ul');
menuToggle.addEventListener('click', ()=>{
    menu.classList.toggle('active');
});
</script>

</body>
</html>
