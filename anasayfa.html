<script src='script.js'></script>
<script>
const countdownEl = document.getElementById('countdown');
// 36 saat geri sayım
const countdownKey = 'anasayfa_countdown';
let endTime = localStorage.getItem(countdownKey);
if(!endTime){
    endTime = new Date().getTime() + 36*60*60*1000;
    localStorage.setItem(countdownKey,endTime);
} else {
    endTime = parseInt(endTime);
}
function updateCountdown(){
    const now = new Date().getTime();
    let distance = endTime - now;
    if(distance<0){distance=0;}
    const hours=Math.floor((distance/(1000*60*60))%24);
    const minutes=Math.floor((distance/(1000*60))%60);
    const seconds=Math.floor((distance/1000)%60);
    countdownEl.innerText=hours+'h '+minutes+'m '+seconds+'s';
}
updateCountdown();
setInterval(updateCountdown,1000);

// Hamburger Menü
const menuToggle = document.getElementById('menu-toggle');
const menu = document.getElementById('menu');
menuToggle.addEventListener('click',()=>{
menu.classList.toggle('active');
menu.style.display = menu.classList.contains('active')?'flex':'none';
});
</script>
